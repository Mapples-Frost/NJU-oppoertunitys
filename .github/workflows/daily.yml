name: Daily Opportunity Radar

"on":
  schedule:
    # GitHub Actions cron uses UTC. 00:00 UTC is 08:00 in Asia/Shanghai.
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: opportunity-radar
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run radar
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          if [ -n "$SMTP_HOST" ] && [ -n "$SMTP_PORT" ] && [ -n "$SMTP_USER" ] && [ -n "$SMTP_PASS" ] && [ -n "$MAIL_FROM" ] && [ -n "$MAIL_TO" ]; then
            python -m radar.main --config config --send-email
          else
            echo "SMTP secrets are incomplete; rendering report without sending email."
            python -m radar.main --config config
          fi

      - name: Commit database and logs
        run: |
          git config user.name "opportunity-radar-bot"
          git config user.email "opportunity-radar-bot@users.noreply.github.com"
          git add data/ logs/
          git commit -m "daily opportunity radar update" || echo "No changes to commit"
          git push
